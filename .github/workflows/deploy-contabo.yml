name: Deploy Contabo

on:
  workflow_dispatch:
  push:
    branches: ["main"]

concurrency:
  group: deploy-contabo-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_DIR: ${{ secrets.CONTABO_APP_DIR }}
        with:
          host: ${{ secrets.CONTABO_HOST }}
          username: ${{ secrets.CONTABO_USER }}
          key: ${{ secrets.CONTABO_SSH_KEY }}
          passphrase: ${{ secrets.CONTABO_SSH_PASSPHRASE }}
          envs: APP_DIR
          script: |
            set -euo pipefail

            APP_DIR="${APP_DIR:-/root/servers/MY-BLOG}"

            cd "$APP_DIR"
            git pull --ff-only origin main

            cd "$APP_DIR/frontend"
            npm ci
            npm run build

            cd "$APP_DIR/backend"
            chmod +x gradlew
            ./gradlew clean bootJar

            sudo systemctl daemon-reload
            sudo systemctl restart jackblog-api
            sudo systemctl restart jackblog-frontend

            sudo systemctl status jackblog-api --no-pager
            sudo systemctl status jackblog-frontend --no-pager

            cd "$APP_DIR"
            chmod +x scripts/deploy-check.sh
            ./scripts/deploy-check.sh blog.jackihyun.com
